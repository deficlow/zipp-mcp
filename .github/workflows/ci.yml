name: ci

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Cancel superseded runs on the same PR — saves minutes when a
  # contributor force-pushes a series of fixups in quick succession.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv tool run ruff@0.15.13 check src tests

  test:
    name: pytest (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install zipp-mcp[dev] into a clean venv
        run: |
          uv venv --python ${{ matrix.python }}
          uv pip install -e ".[dev]"

      - name: pytest
        run: uv run pytest -q

      - name: Build wheel (sanity)
        # Catches packaging-only regressions — e.g. a missing
        # py.typed marker or a stray top-level module — that the
        # editable install would silently mask.
        run: uv build --wheel
