# Smithery configuration for Zipp — hosted-only, remote MCP server.
#
# This file is consumed by the Smithery CLI / publish flow. Only `name`,
# `target`, `runtime`, and `startCommand` are interpreted; cosmetic
# metadata (display name, long description, icon, tags, screenshots) is
# edited from the Smithery web panel at:
#
#   https://smithery.ai/servers/deficlow/zipp/settings
#
# Reference: https://smithery.ai/docs/build/project-config

name: zipp
target: remote

startCommand:
  type: streamableHttp
  url: https://zippfeed.com/mcp/
  configSchema:
    type: object
    properties: {}
    additionalProperties: false
  exampleConfig: {}
